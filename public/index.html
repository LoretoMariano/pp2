<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi E-Commerce</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">NeoData Shop</span>

        <div class="dropdown">
          <button
            class="btn btn-outline-light dropdown-toggle"
            type="button"
            id="boton-carrito"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            Carrito (<span id="cart-count">0</span>)
          </button>

          <div class="dropdown-menu dropdown-menu-end p-3 shadow" aria-labelledby="boton-carrito" style="width: 320px">
            <h6 class="dropdown-header text-primary px-0 fs-6">
              Resumen de la Compra
            </h6>

            <div id="detalle-carrito" class="text-muted small my-2">
              El carrito está vacío.
            </div>

            <div class="dropdown-divider"></div>

            <div class="d-flex justify-content-between align-items-center my-2">
              <span class="fw-bold text-dark">Total:</span>
              <span class="text-success fw-bold" id="total-precio">$0</span>
            </div>

            <button
              class="btn btn-sm btn-outline-danger w-100 fw-bold mt-2"
              onclick="vaciarCarrito()"
            >
              Vaciar Carrito 🗑️
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="container w-75 mt-5 mx-auto" id="app">
      <h2 class="display-5 fw-bold fs-4 text-center mb-5">Productos</h2>
      <div id="productos-container" class="row g-4 justify-content-center">
        <div class="col-md-3">
          <div class="card h-100 shadow-sm border-0 shadow">
            <div class="ratio ratio-4x3 p-3">
              <img
                src="./img/iphone16.png"
                class="card-img-top object-fit-contain"
                alt="Celular iPhone 16 Pro Max"
              />
            </div>
            <div class="card-body d-flex flex-column shadow">
              <div>
                <span class="badge bg-danger mb-2 small fs-7">10% OFF</span>
              </div>
              <h5 class="fs-6 fw-semibold text-dark mb-1 mt-1">
                iPhone 16 Pro Max
              </h5>
              <p class="card-text text-primary fw-bold fs-5 mb-auto">
                $1.123.500
              </p>
              <div class="mt-3">
                <label class="form-label small fw-bold text-secondary mb-1"
                  >Cantidad:</label
                >
                <input
                  type="number"
                  class="form-control form-control-sm mb-3"
                  value="1"
                  min="1"
                  id="cantidad-iphone"
                />
                <button
                  class="btn btn-success w-100 fw-bold py-2 shadow-sm"
                  onclick="
                    agregarAlCarrito(
                      'cantidad-iphone',
                      'iPhone 16 Pro Max',
                      1123500,
                    );
                    actualizarCarrito();
                  "
                >
                  Agregar al Carrito
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card h-100 shadow-sm border-0 shadow">
            <div class="ratio ratio-4x3 p-3">
              <img
                src="./img/Sony WH-1000XM5.png"
                class="card-img-top object-fit-contain"
                alt="Auriculares Sony WH-1000XM5"
              />
            </div>
            <div class="card-body d-flex flex-column shadow">
              <div>
                <span class="badge bg-danger mb-2 small fs-7">15% OFF</span>
              </div>
              <h5 class="fs-6 fw-semibold text-dark mb-1 mt-1">
                Auriculares Sony WH-1000XM5
              </h5>
              <p class="card-text text-primary fw-bold fs-5 mb-auto">$69.999</p>
              <div class="mt-3">
                <label class="form-label small fw-bold text-secondary mb-1"
                  >Cantidad:</label
                >
                <input
                  type="number"
                  class="form-control form-control-sm mb-3"
                  value="1"
                  min="1"
                  id="cantidad-sony"
                />
                <button
                  class="btn btn-success w-100 fw-bold py-2 shadow-sm"
                  onclick="
                    agregarAlCarrito(
                      'cantidad-sony',
                      'Auriculares Sony WH-1000XM5',
                      69999,
                    );
                    actualizarCarrito();
                  "
                >
                  Agregar al Carrito
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card h-100 shadow-sm border-0 shadow">
            <div class="ratio ratio-4x3 p-3">
              <img
                src="./img/smartwatch.png"
                class="card-img-top object-fit-contain"
                alt="Smartwatch"
              />
            </div>
            <div class="card-body d-flex flex-column shadow">
              <div>
                <span class="badge text-bg-primary fs-7">Nuevo</span>
              </div>
              <h5 class="fs-6 fw-semibold text-dark mt-2">
                Smartwatch JD Venecia Sport
              </h5>
              <p class="card-text text-primary fw-bold fs-5 mb-auto">$36.999</p>
              <div class="mt-3">
                <label class="form-label small fw-bold text-secondary mb-1"
                  >Cantidad:</label
                >
                <input
                  type="number"
                  class="form-control form-control-sm mb-3"
                  value="1"
                  min="1"
                  id="cantidad-smartwatch"
                />
                <button
                  class="btn btn-success w-100 fw-bold py-2 shadow-sm"
                  onclick="
                    agregarAlCarrito(
                      'cantidad-smartwatch',
                      'Smartwatch JD Venecia Sport',
                      36999,
                    );
                    actualizarCarrito();
                  "
                >
                  Agregar al Carrito
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
